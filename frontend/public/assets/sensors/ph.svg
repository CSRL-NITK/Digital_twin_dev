<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.4)" />
      <stop offset="40%" stop-color="rgba(16, 185, 129, 0.2)" />
      <stop offset="100%" stop-color="rgba(16, 185, 129, 0.6)" />
    </linearGradient>
    <radialGradient id="bulbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="70%" stop-color="#059669" />
      <stop offset="100%" stop-color="#064e3b" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cable / Connector Boot -->
  <path d="M 45 5 L 55 5 L 53 22 L 47 22 Z" fill="#475569" stroke="#334155" stroke-width="1" />
  
  <!-- Probe Main Body (Protective sheath) -->
  <rect x="42" y="22" width="16" height="50" rx="2" fill="url(#bodyGrad)" stroke="#475569" stroke-width="1" />
  
  <!-- Metallic collars / Rings -->
  <rect x="40" y="32" width="20" height="4" fill="#64748b" />
  <rect x="40" y="60" width="20" height="4" fill="#64748b" />

  <!-- Glass Bulb Shield (Transparent cage) -->
  <path d="M 43 72 L 57 72 L 55 86 C 53 90, 47 90, 45 86 Z" fill="url(#glassGrad)" stroke="#10b981" stroke-width="1.5" />
  
  <!-- Inner Reference Electrode (thin line) -->
  <line x1="50" y1="28" x2="50" y2="80" stroke="#00ffff" stroke-width="1" opacity="0.8" />
  
  <!-- Glowing pH Bulb -->
  <circle cx="50" cy="82" r="5" fill="url(#bulbGlow)" filter="url(#glow)" />
  
  <!-- Protective cage slots (Horizontal slits) -->
  <line x1="45" y1="76" x2="55" y2="76" stroke="#064e3b" stroke-width="1.5" />
  <line x1="45" y1="82" x2="55" y2="82" stroke="#064e3b" stroke-width="1.5" />
</svg>
