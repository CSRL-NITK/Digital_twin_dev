<svg
  id="temp-sensor-svg"
  viewBox="0 0 240 380"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  preserveAspectRatio="xMidYMid meet"
>
  <defs>
    <!-- Soft elegant shadow for cartoon element outlining -->
    <filter id="cartoonDropShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>

    <!-- Clean background backing gradient for scale plate -->
    <linearGradient id="backingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Beautiful, clean 3D fluid gradient (Light to Base to Dark) for static 37.5°C (Teal/Cyan) using userSpaceOnUse to render perfectly on vertical lines -->
    <linearGradient id="fluidGrad" x1="117" y1="0" x2="123" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgb(108, 212, 208)" />
      <stop offset="40%" stop-color="rgb(10, 183, 177)" />
      <stop offset="100%" stop-color="rgb(7, 119, 115)" />
    </linearGradient>

    <!-- Smooth, rich radial gradient for the liquid reservoir bulb (Highlight -> Base -> Shadow) -->
    <radialGradient id="liquidBulbGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="rgb(108, 212, 208)" />
      <stop offset="55%" stop-color="rgb(10, 183, 177)" />
      <stop offset="100%" stop-color="rgb(7, 119, 115)" />
    </radialGradient>

    <!-- Clean, high-contrast outer envelope glass reflection gradient -->
    <linearGradient id="glassReflectionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>

  <!-- Ambient glow removed to ensure a clean bottom layout -->

  <!-- COMPACT CARTOON THERMOMETER -->
  <g filter="url(#cartoonDropShadow)">
    
    <!-- 1. OUTER CARTOON-STYLE GLASS ENVELOPE (SOLID WHITE BACKING) -->
    <!-- This solid fill prevents any transparency issues and gives a premium badge feel -->
    <path 
      d="M 100 45 
         A 20 20 0 0 1 140 45 
         L 140 250 
         C 140 265, 145.5 268.9, 151 276 
         A 39.2 39.2 0 1 1 89 276 
         C 94.5 268.9, 100 265, 100 250 Z" 
      fill="url(#glassReflectionGrad)" 
      stroke="#0f172a" 
      stroke-width="3.5" 
      stroke-linejoin="round" 
      stroke-linecap="round" 
    />

    <!-- 2. SCALE PLATE BACKING STRIP (STRICTLY INSIDE TUBE) -->
    <path 
      d="M 105 48 
         A 15 15 0 0 1 135 48 
         L 135 250 
         C 135 262, 139.5 269, 144 273 
         A 36.12 36.12 0 1 1 96 273 
         C 100.5 269, 105 262, 105 250 Z" 
      fill="url(#backingGrad)" 
      stroke="#cbd5e1" 
      stroke-width="1.5"
    />

    <!-- 3. HIGH-CONTRAST MEASUREMENT MARKINGS (STRICTLY INSIDE BACKING STRIP) -->
    <g id="internal-markings" style="user-select: none;">
      <!-- Temperature Labels (Celsius) - Cleanly Aligned on Left -->
      <g fill="#475569" style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 7px;">
        <text x="115.5" y="67.5" text-anchor="end">100</text>
        <line x1="124" y1="65" x2="130" y2="65" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />

        <text x="115.5" y="102.5" text-anchor="end">80</text>
        <line x1="124" y1="100" x2="130" y2="100" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />

        <text x="115.5" y="137.5" text-anchor="end">60</text>
        <line x1="124" y1="135" x2="130" y2="135" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />

        <text x="115.5" y="172.5" text-anchor="end">40</text>
        <line x1="124" y1="170" x2="130" y2="170" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />

        <text x="115.5" y="207.5" text-anchor="end">20</text>
        <line x1="124" y1="205" x2="130" y2="205" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />

        <text x="115.5" y="242.5" text-anchor="end">0</text>
        <line x1="124" y1="240" x2="130" y2="240" stroke="#334155" stroke-width="1.2" stroke-linecap="round" />
      </g>

      <!-- Minor Intermediate Ticks (every 10°C) -->
      <g stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round">
        <line x1="124" y1="82.5" x2="127" y2="82.5" />
        <line x1="124" y1="117.5" x2="127" y2="117.5" />
        <line x1="124" y1="152.5" x2="127" y2="152.5" />
        <line x1="124" y1="187.5" x2="127" y2="187.5" />
        <line x1="124" y1="222.5" x2="127" y2="222.5" />
      </g>
    </g>

    <!-- 4. DYNAMIC FLUID COLUMN (CAPILLARY TUBE - MERGES INTO BULB) -->
    <g id="fluid-capillary">
      <!-- Guide background groove -->
      <line 
        x1="120" 
        y1="50" 
        x2="120" 
        y2="285" 
        stroke="#e2e8f0" 
        stroke-width="8" 
        stroke-linecap="round" 
      />

      <!-- Dynamic rising color column - Extended deep into bulb center (Y=295) for a seamless merge -->
      <line 
        x1="120" 
        y1="295" 
        x2="120" 
        y2="174.3" 
        stroke="url(#fluidGrad)" 
        stroke-width="6" 
        stroke-linecap="round" 
      />

      <!-- Meniscus circle cap at the top of fluid column -->
      <circle 
        cx="120" 
        cy="174.3" 
        r="3" 
        fill="rgb(10, 183, 177)" 
      />
    </g>

    <!-- 5. CARTOON ROUND BULB AT THE BOTTOM (PERFECTLY MERGED SHADING) -->
    <g id="fluid-bulb">
      <!-- Fluid Bulb base circle - Stroke removed to merge perfectly with the fluid column -->
      <circle 
        cx="120" 
        cy="300" 
        r="23" 
        fill="url(#liquidBulbGrad)" 
      />
    </g>

    <!-- 6. GLASS SHINES & REFLECTIONS -->
    <!-- Subtle inner glass shine / gloss accent along the left edge - Stopped early at the straight tube for perfect transition -->
    <path 
      d="M 104 52 
         L 104 245" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="2.5" 
      stroke-linecap="round" 
      opacity="0.75" 
    />

    <!-- Outer glass reflection highlight removed as requested for smooth bottom circle edges -->
  </g>
</svg>
