<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="probeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="50%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <radialGradient id="dialGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="70%" stop-color="#991b1b" />
      <stop offset="100%" stop-color="#450a0a" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Metal Thermowell / Insertion Probe -->
  <rect x="46" y="45" width="8" height="42" fill="url(#probeGrad)" stroke="#64748b" stroke-width="0.5" />
  <!-- Pointed Probe Tip -->
  <path d="M 46 87 L 54 87 L 50 94 Z" fill="url(#probeGrad)" stroke="#64748b" stroke-width="0.5" />
  
  <!-- NPT Thread / Mounting Collar -->
  <polygon points="41,45 59,45 56,38 44,38" fill="#64748b" stroke="#475569" stroke-width="0.75" />
  <rect x="43" y="42" width="14" height="3" fill="#475569" />

  <!-- Transmitters connection block (Hex housing) -->
  <polygon points="35,38 65,38 68,20 32,20" fill="url(#headGrad)" stroke="#991b1b" stroke-width="1" />
  
  <!-- Dial / Display window frame -->
  <circle cx="50" cy="27" r="11" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5" />
  
  <!-- Inner LCD Screen dial face -->
  <circle cx="50" cy="27" r="8" fill="#0f172a" />
  
  <!-- Glowing digital indicator or level line -->
  <circle cx="50" cy="27" r="5" fill="url(#dialGlow)" filter="url(#glow)" opacity="0.9" />
  
  <!-- Thermal heat signature waves at bottom tip -->
  <path d="M 43 91 Q 40 93 43 95" fill="none" stroke="#ef4444" stroke-width="1" stroke-linecap="round" opacity="0.6" />
  <path d="M 57 91 Q 60 93 57 95" fill="none" stroke="#ef4444" stroke-width="1" stroke-linecap="round" opacity="0.6" />
</svg>
